<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#0c0c0c" />
    <title>てんちょーテトリス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Noto+Sans+JP:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #e8133a;
        --red-deep: #a2032a;
        --yellow: #ffe100;
        --pink: #ff4da6;
        --ink: #0a0a0a;
        --paper: #fff;
        --paper-2: #fff8e0;
        --stroke: 4px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
        font-weight: 700;
        color: var(--ink);
        background:
          radial-gradient(900px 700px at 10% 10%, rgba(232, 19, 58, 0.35), transparent 60%),
          radial-gradient(900px 700px at 90% 95%, rgba(255, 225, 0, 0.22), transparent 60%),
          radial-gradient(700px 500px at 70% 20%, rgba(255, 77, 166, 0.18), transparent 60%),
          #0c0c0c;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      /* Animated diagonal "tape" background stripes */
      body::before {
        content: "";
        position: fixed;
        inset: -20%;
        background:
          repeating-linear-gradient(
            -20deg,
            rgba(255, 225, 0, 0.04) 0 24px,
            transparent 24px 64px
          );
        pointer-events: none;
        z-index: 0;
      }
      #app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100dvh;
        max-height: 100dvh;
        padding: 10px 14px 8px;
        gap: 8px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .title {
        font-family: "Mochiy Pop P One", "Noto Sans JP", sans-serif;
        font-size: clamp(20px, 5.5vw, 30px);
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--red), 6px 6px 0 #000;
        transform: rotate(-2deg);
        margin: 0;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      .title .dot {
        display: inline-block;
        color: var(--red);
        transform: rotate(4deg) translateY(2px);
      }
      .top-buttons { display: flex; gap: 6px; }
      .icon-btn {
        background: var(--paper);
        border: 3px solid #000;
        color: #000;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
        transition: transform 0.05s;
      }
      .icon-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 170px;
        gap: 12px;
        min-height: 0;
        max-height: calc(100dvh - 80px);
        overflow: hidden;
      }
      aside.side {
        min-height: 0;
        overflow: hidden;
      }
      .board-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        min-width: 0;
        height: 100%;
      }
      .board-frame {
        position: relative;
        padding: 6px;
        background: #fff;
        border: 4px solid #000;
        border-radius: 18px;
        box-shadow: 6px 6px 0 #000, 0 0 0 3px var(--yellow) inset;
        aspect-ratio: 340 / 680;
        max-height: 100%;
        max-width: 100%;
      }
      canvas#board {
        display: block;
        background: #111;
        border-radius: 12px;
        height: 100%;
        width: 100%;
        object-fit: contain;
      }
      canvas#fx {
        position: absolute;
        inset: 6px;
        pointer-events: none;
        border-radius: 12px;
        width: calc(100% - 12px);
        height: calc(100% - 12px);
      }
      .banner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 3;
      }
      .banner .text {
        font-family: "Mochiy Pop P One", "Noto Sans JP", sans-serif;
        font-weight: 900;
        font-size: clamp(36px, 10vw, 110px);
        letter-spacing: 0.01em;
        text-align: center;
        color: var(--yellow);
        -webkit-text-stroke: 7px #000;
        paint-order: stroke fill;
        text-shadow:
          6px 6px 0 var(--red),
          10px 10px 0 #000;
        opacity: 0;
        transform: scale(0.4) rotate(-8deg);
        white-space: nowrap;
      }
      .banner.show .text {
        animation: pop 1.6s cubic-bezier(.2,.9,.2,1) forwards,
                   shake 0.6s 0.1s ease-in-out;
      }
      @keyframes pop {
        0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
        12%  { opacity: 1; transform: scale(1.25) rotate(4deg); }
        22%  { transform: scale(0.9) rotate(-3deg); }
        35%  { transform: scale(1.1) rotate(2deg); }
        55%  { transform: scale(1) rotate(-2deg); }
        80%  { opacity: 1; transform: scale(1) rotate(-2deg); }
        100% { opacity: 0; transform: scale(1) rotate(-2deg); }
      }
      @keyframes shake {
        0%,100% { translate: 0 0; }
        20% { translate: -8px 3px; }
        40% { translate: 8px -3px; }
        60% { translate: -5px 2px; }
        80% { translate: 5px -2px; }
      }
      .combo-banner {
        position: absolute;
        top: 12%;
        left: 0;
        right: 0;
        text-align: center;
        pointer-events: none;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(24px, 6vw, 54px);
        color: var(--pink);
        -webkit-text-stroke: 5px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 #000;
        opacity: 0;
        transform: scale(0.6) rotate(-4deg);
        transition: none;
        z-index: 3;
      }
      .combo-banner.show {
        animation: combo 0.9s ease-out forwards;
      }
      @keyframes combo {
        0%   { opacity: 0; transform: scale(0.3) rotate(-12deg); }
        20%  { opacity: 1; transform: scale(1.2) rotate(3deg); }
        40%  { transform: scale(0.95) rotate(-2deg); }
        70%  { opacity: 1; transform: scale(1) rotate(0); }
        100% { opacity: 0; transform: scale(0.9) rotate(0); }
      }

      /* Sticker cards */
      .side {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
        min-height: 0;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .card {
        background: var(--paper);
        border: 3px solid #000;
        border-radius: 12px;
        padding: 5px 8px;
        box-shadow: 3px 3px 0 #000;
        color: #000;
      }
      .card.red { background: var(--red); color: #fff; }
      .card.yellow { background: var(--yellow); }
      .card.pink { background: var(--pink); color: #fff; }
      .card h3 {
        margin: 0;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 10px;
        letter-spacing: 0.08em;
        line-height: 1.1;
      }
      .card .value {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 18px;
        line-height: 1.05;
        font-variant-numeric: tabular-nums;
      }
      .card .value.small { font-size: 15px; }
      .card .best-tag {
        display: inline-block;
        background: #000;
        color: var(--yellow);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 9px;
        padding: 0 5px;
        border-radius: 6px;
        transform: rotate(-2deg);
        margin-bottom: 1px;
      }
      .preview-card {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 5px 6px;
      }
      .preview-col { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .preview-col h3 { font-size: 10px; }
      .mini-canvas {
        width: 100%;
        aspect-ratio: 4 / 3;
        background: #fff;
        border: 2px solid #000;
        border-radius: 6px;
        display: block;
      }
      .help {
        font-size: 10px;
        color: #000;
        line-height: 1.55;
        font-weight: 700;
        padding: 5px 7px;
      }
      .help kbd {
        background: #000;
        color: var(--yellow);
        padding: 0 4px;
        border-radius: 3px;
        font-size: 9px;
        font-family: "Mochiy Pop P One", monospace;
        margin: 0 1px;
      }

      /* Touch buttons — iOS game controller style */
      .touch {
        display: none;
        grid-template-columns: 3fr 2fr;
        gap: 10px;
        padding: 4px 0 6px;
      }
      .touch-dpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 1fr 1fr;
        gap: 8px;
      }
      .touch-dpad .t-rotate { grid-column: 2; grid-row: 1; }
      .touch-dpad .t-left   { grid-column: 1; grid-row: 2; }
      .touch-dpad .t-down   { grid-column: 2; grid-row: 2; }
      .touch-dpad .t-right  { grid-column: 3; grid-row: 2; }
      .touch-actions {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 8px;
      }
      /* Base: circular glass button */
      .touch button {
        background: rgba(255,255,255,0.13);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.22);
        color: #fff;
        font-size: 22px;
        border-radius: 50%;
        aspect-ratio: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
        transition: background 0.1s, transform 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      .touch button:active {
        background: rgba(255,255,255,0.28);
        transform: scale(0.88);
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      /* Action buttons: pill shape instead of circle */
      .touch-actions button {
        border-radius: 18px;
        aspect-ratio: auto;
        flex-direction: column;
        gap: 2px;
        font-size: 20px;
      }
      .touch-actions button span {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        opacity: 0.85;
        font-family: -apple-system, "SF Pro Display", sans-serif;
      }
      /* Color accents */
      .touch .t-rotate {
        background: rgba(255,214,10,0.22);
        border-color: rgba(255,214,10,0.4);
        color: #ffd60a;
      }
      .touch .t-drop {
        background: rgba(255,55,95,0.22);
        border-color: rgba(255,55,95,0.4);
        color: #ff375f;
      }
      .touch .t-hold {
        background: rgba(10,132,255,0.22);
        border-color: rgba(10,132,255,0.4);
        color: #5ac8fa;
      }

      @media (pointer: coarse), (max-width: 720px) {
        .touch { display: grid; }
        /* Vertical mobile: compact stat strip on top, board fills remaining space */
        #app {
          padding: 6px 8px 4px;
          gap: 4px;
          grid-template-rows: auto 1fr auto;
        }
        main {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
          gap: 4px;
          max-height: none;
          overflow: visible;
        }
        aside.side {
          order: -1;
          flex-direction: row;
          align-items: center;
          gap: 5px;
          overflow: visible;
          max-height: none;
          min-height: 0;
        }
        /* Stat cards: single horizontal 4-column strip */
        .stat-grid {
          grid-template-columns: repeat(4, 1fr);
          grid-template-rows: 1fr;
          gap: 4px;
          flex: 1 1 auto;
          min-width: 0;
        }
        .stat-grid .card { padding: 3px 6px; }
        .stat-grid .card h3 { font-size: 8px; }
        .stat-grid .card .value { font-size: 13px; }
        .stat-grid .card .value.small { font-size: 12px; }
        .stat-grid .card .best-tag { font-size: 7px; padding: 0 3px; }
        /* Hide NEXT/HOLD and help on mobile to give board more room */
        .preview-card { display: none; }
        .help { display: none; }
        .board-wrap { order: 0; min-height: 0; }
        .board-frame {
          aspect-ratio: 340 / 680;
          max-height: 100%;
          max-width: 100%;
        }
        .title { font-size: clamp(16px, 4.5vw, 24px); }
        .icon-btn { padding: 4px 8px; font-size: 12px; }
        .touch { gap: 8px; padding: 2px 0 4px; }
        .touch button { min-height: 52px; font-size: 20px; }
        .touch-actions button { font-size: 18px; }
      }
      @media (pointer: coarse) and (max-width: 380px),
             (max-width: 380px) {
        .touch button { min-height: 46px; font-size: 18px; }
      }

      /* Ueda cut-in overlay (dramatic combo celebration) */
      #cutin {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 6;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #cutin.show .cutin-flash {
        animation: flashBurst 0.55s ease-out forwards;
      }
      #cutin.show .cutin-stripe {
        animation: stripeSweep 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      }
      #cutin.show .cutin-img {
        animation: slideIn 1.9s cubic-bezier(.15,.8,.2,1) forwards;
      }
      #cutin.show .cutin-text {
        animation: textPunch 1.8s cubic-bezier(.15,.85,.25,1) forwards;
      }
      .cutin-flash {
        position: absolute;
        inset: -20%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 255, 255, 1) 0%,
          rgba(255, 225, 0, 0.8) 20%,
          rgba(232, 19, 58, 0.5) 40%,
          transparent 70%
        );
        opacity: 0;
      }
      .cutin-stripe {
        position: absolute;
        left: -120%;
        top: 0;
        width: 240%;
        height: 100%;
        background: repeating-linear-gradient(
          -15deg,
          var(--red) 0 30px,
          var(--yellow) 30px 60px,
          var(--red) 60px 90px,
          #000 90px 110px
        );
        opacity: 0;
        transform: skewX(-10deg);
      }
      .cutin-img-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        pointer-events: none;
        overflow: hidden;
        z-index: 2;
      }
      .cutin-img {
        height: 100%;
        max-height: 100%;
        opacity: 0;
        filter: drop-shadow(-6px 6px 0 #000) drop-shadow(8px 0 0 var(--red));
        transform: translateX(120%) rotate(10deg) scale(0.85);
        pointer-events: none;
        transform-origin: center bottom;
      }
      .cutin-text {
        position: absolute;
        left: 50%;
        top: 50%;
        font-family: "Mochiy Pop P One", sans-serif;
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red), 6px 6px 0 #000;
        line-height: 1;
        transform: translate(-50%, -50%) scale(0.4) rotate(-8deg);
        transform-origin: center center;
        opacity: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        pointer-events: none;
        text-align: center;
      }
      .cutin-line1 {
        font-size: clamp(22px, 6vw, 36px);
        transform: rotate(-4deg);
        display: inline-block;
        white-space: nowrap;
      }
      .cutin-line2 {
        font-size: clamp(28px, 7.5vw, 48px);
        display: inline-block;
        white-space: nowrap;
        color: #fff;
        text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 #000;
        transform: rotate(2deg);
      }
      .cutin-text .combo-num {
        display: inline-block;
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        font-size: 1.5em;
        transform: rotate(-8deg) translateY(2px);
        margin-right: 4px;
        text-shadow: 3px 3px 0 var(--red), 6px 6px 0 #000;
      }
      /* Semi-opaque dimmer behind cut-in text so it stays readable */
      .cutin-dim {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(0, 0, 0, 0.55) 0%,
          rgba(0, 0, 0, 0.35) 40%,
          transparent 80%
        );
        opacity: 0;
      }
      #cutin.show .cutin-dim {
        animation: dimPulse 1.6s ease-out forwards;
      }
      @keyframes dimPulse {
        0%   { opacity: 0; }
        15%  { opacity: 1; }
        75%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes flashBurst {
        0%   { opacity: 0; }
        15%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes stripeSweep {
        0%   { opacity: 0; left: -120%; }
        15%  { opacity: 0.9; }
        100% { opacity: 0; left: 120%; }
      }
      @keyframes slideIn {
        0%   { opacity: 0; transform: translateX(120%) rotate(10deg) scale(0.85); }
        22%  { opacity: 1; transform: translateX(-4%) rotate(-7deg) scale(1.1); }
        38%  { transform: translateX(3%) rotate(3deg) scale(1); }
        55%  { transform: translateX(0) rotate(-2deg) scale(1.03); }
        85%  { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
        100% { opacity: 0; transform: translateX(0) rotate(0deg) scale(1.02); }
      }
      @keyframes textPunch {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-15deg); }
        10%  { opacity: 1; transform: translate(-50%, -50%) scale(1.35) rotate(6deg); }
        20%  { transform: translate(-50%, -50%) scale(0.95) rotate(-4deg); }
        30%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
        45%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        90%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(-2deg); }
      }
      /* Screen shake when cut-in fires */
      .board-frame.shake {
        animation: frameShake 0.45s ease-out;
      }
      @keyframes frameShake {
        0%,100% { transform: translate(0,0); }
        15% { transform: translate(-4px, 2px) rotate(-0.4deg); }
        30% { transform: translate(5px, -2px) rotate(0.3deg); }
        45% { transform: translate(-3px, 3px) rotate(-0.2deg); }
        60% { transform: translate(4px, -1px) rotate(0.2deg); }
        80% { transform: translate(-2px, 1px); }
      }

      /* Float score popups */
      #floaters {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 4;
      }
      .floater {
        position: absolute;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(22px, 5vw, 40px);
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red);
        transform: translate(-50%, -50%);
        animation: floatUp 1.1s ease-out forwards;
        white-space: nowrap;
      }
      .floater.combo { color: var(--pink); }
      .floater.quad { color: #fff; text-shadow: 3px 3px 0 var(--red), -2px -2px 0 var(--yellow); }
      @keyframes floatUp {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        20%  { opacity: 1; transform: translate(-50%, -65%) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, -140%) scale(0.9); }
      }

      /* Game over overlay */
      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 14px;
        z-index: 5;
      }
      .overlay.show { display: flex; }
      .overlay .box {
        text-align: center;
        padding: 18px 24px;
        background: var(--paper);
        border: 4px solid #000;
        border-radius: 18px;
        box-shadow: 6px 6px 0 #000;
        transform: rotate(-1.5deg);
        max-width: 92%;
      }
      .overlay h2 {
        font-family: "Mochiy Pop P One", sans-serif;
        margin: 0 0 6px;
        font-size: clamp(22px, 6vw, 32px);
        color: var(--red);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 #000;
        white-space: nowrap;
      }
      .overlay .score-line {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(18px, 4vw, 24px);
        color: #000;
        margin: 6px 0;
      }
      .overlay .new-best {
        display: inline-block;
        background: var(--yellow);
        color: #000;
        border: 3px solid #000;
        padding: 4px 10px;
        border-radius: 8px;
        transform: rotate(-3deg);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 16px;
        margin: 4px 0;
      }
      .overlay .actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .overlay button {
        font-family: "Mochiy Pop P One", sans-serif;
        border: 3px solid #000;
        border-radius: 999px;
        padding: 10px 22px;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
        transition: transform 0.05s;
      }
      .overlay button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
      .btn-again { background: var(--red); color: #fff; }
      .btn-share { background: var(--yellow); color: #000; }

      /* Start overlay — fullscreen so header/stats/buttons don't show through */
      .start-overlay {
        position: fixed;
        inset: 0;
        border-radius: 0;
        background: radial-gradient(
          circle at 50% 40%,
          rgba(40, 0, 15, 0.92) 0%,
          rgba(0, 0, 0, 0.98) 80%
        );
        z-index: 100;
      }
      .start-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 22px 28px;
      }
      .start-title {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(28px, 9vw, 54px);
        line-height: 1;
        color: var(--yellow);
        -webkit-text-stroke: 5px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--red), 8px 8px 0 #000;
        transform: rotate(-3deg);
        text-align: center;
        white-space: nowrap;
      }
      .start-title .dot { color: var(--red); display: inline-block; transform: rotate(6deg); }
      .start-sub {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(14px, 3.4vw, 18px);
        color: #000;
        text-align: center;
        line-height: 1.4;
        margin-top: 4px;
      }
      .start-sub .start-accent {
        color: var(--red);
        -webkit-text-stroke: 2px #000;
        paint-order: stroke fill;
        font-size: 1.15em;
      }
      .btn-start {
        background: var(--red);
        color: #fff;
        border: 4px solid #000;
        border-radius: 999px;
        padding: 14px 36px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(20px, 5vw, 28px);
        cursor: pointer;
        box-shadow: 5px 5px 0 #000;
        letter-spacing: 0.04em;
        transition: transform 0.05s;
        animation: btnPulse 1.2s ease-in-out infinite;
      }
      .btn-start:active {
        transform: translate(3px, 3px);
        box-shadow: 2px 2px 0 #000;
      }
      @keyframes btnPulse {
        0%, 100% { transform: scale(1) rotate(-1deg); }
        50%      { transform: scale(1.06) rotate(1deg); }
      }
      .start-hint {
        font-size: 11px;
        color: #000;
        font-weight: 700;
        opacity: 0.75;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%) translateY(30px);
        background: #000;
        color: var(--yellow);
        border: 3px solid var(--yellow);
        padding: 8px 16px;
        border-radius: 999px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.25s, transform 0.25s;
        z-index: 10;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#0c0c0c" />
    <title>てんちょーテトリス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Noto+Sans+JP:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #e8133a;
        --red-deep: #a2032a;
        --yellow: #ffe100;
        --pink: #ff4da6;
        --ink: #0a0a0a;
        --paper: #fff;
        --paper-2: #fff8e0;
        --stroke: 4px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
        font-weight: 700;
        color: var(--ink);
        background:
          radial-gradient(900px 700px at 10% 10%, rgba(232, 19, 58, 0.35), transparent 60%),
          radial-gradient(900px 700px at 90% 95%, rgba(255, 225, 0, 0.22), transparent 60%),
          radial-gradient(700px 500px at 70% 20%, rgba(255, 77, 166, 0.18), transparent 60%),
          #0c0c0c;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      /* Animated diagonal "tape" background stripes */
      body::before {
        content: "";
        position: fixed;
        inset: -20%;
        background:
          repeating-linear-gradient(
            -20deg,
            rgba(255, 225, 0, 0.04) 0 24px,
            transparent 24px 64px
          );
        pointer-events: none;
        z-index: 0;
      }
      #app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100dvh;
        max-height: 100dvh;
        padding: 10px 14px 8px;
        gap: 8px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .title {
        font-family: "Mochiy Pop P One", "Noto Sans JP", sans-serif;
        font-size: clamp(20px, 5.5vw, 30px);
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--red), 6px 6px 0 #000;
        transform: rotate(-2deg);
        margin: 0;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      .title .dot {
        display: inline-block;
        color: var(--red);
        transform: rotate(4deg) translateY(2px);
      }
      .top-buttons { display: flex; gap: 6px; }
      .icon-btn {
        background: var(--paper);
        border: 3px solid #000;
        color: #000;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
        transition: transform 0.05s;
      }
      .icon-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 170px;
        gap: 12px;
        min-height: 0;
        max-height: calc(100dvh - 80px);
        overflow: hidden;
      }
      aside.side {
        min-height: 0;
        overflow-y: auto;
      }
      .board-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        min-width: 0;
        height: 100%;
      }
      .board-frame {
        position: relative;
        padding: 6px;
        background: #fff;
        border: 4px solid #000;
        border-radius: 18px;
        box-shadow: 6px 6px 0 #000, 0 0 0 3px var(--yellow) inset;
        aspect-ratio: 340 / 680;
        max-height: 100%;
        max-width: 100%;
      }
      canvas#board {
        display: block;
        background: #111;
        border-radius: 12px;
        height: 100%;
        width: 100%;
        object-fit: contain;
      }
      canvas#fx {
        position: absolute;
        inset: 6px;
        pointer-events: none;
        border-radius: 12px;
        width: calc(100% - 12px);
        height: calc(100% - 12px);
      }
      .banner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 3;
      }
      .banner .text {
        font-family: "Mochiy Pop P One", "Noto Sans JP", sans-serif;
        font-weight: 900;
        font-size: clamp(36px, 10vw, 110px);
        letter-spacing: 0.01em;
        text-align: center;
        color: var(--yellow);
        -webkit-text-stroke: 7px #000;
        paint-order: stroke fill;
        text-shadow:
          6px 6px 0 var(--red),
          10px 10px 0 #000;
        opacity: 0;
        transform: scale(0.4) rotate(-8deg);
        white-space: nowrap;
      }
      .banner.show .text {
        animation: pop 1.6s cubic-bezier(.2,.9,.2,1) forwards,
                   shake 0.6s 0.1s ease-in-out;
      }
      @keyframes pop {
        0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
        12%  { opacity: 1; transform: scale(1.25) rotate(4deg); }
        22%  { transform: scale(0.9) rotate(-3deg); }
        35%  { transform: scale(1.1) rotate(2deg); }
        55%  { transform: scale(1) rotate(-2deg); }
        80%  { opacity: 1; transform: scale(1) rotate(-2deg); }
        100% { opacity: 0; transform: scale(1) rotate(-2deg); }
      }
      @keyframes shake {
        0%,100% { translate: 0 0; }
        20% { translate: -8px 3px; }
        40% { translate: 8px -3px; }
        60% { translate: -5px 2px; }
        80% { translate: 5px -2px; }
      }
      .combo-banner {
        position: absolute;
        top: 12%;
        left: 0;
        right: 0;
        text-align: center;
        pointer-events: none;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(24px, 6vw, 54px);
        color: var(--pink);
        -webkit-text-stroke: 5px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 #000;
        opacity: 0;
        transform: scale(0.6) rotate(-4deg);
        transition: none;
        z-index: 3;
      }
      .combo-banner.show {
        animation: combo 0.9s ease-out forwards;
      }
      @keyframes combo {
        0%   { opacity: 0; transform: scale(0.3) rotate(-12deg); }
        20%  { opacity: 1; transform: scale(1.2) rotate(3deg); }
        40%  { transform: scale(0.95) rotate(-2deg); }
        70%  { opacity: 1; transform: scale(1) rotate(0); }
        100% { opacity: 0; transform: scale(0.9) rotate(0); }
      }

      /* Sticker cards */
      .side {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
      }
      .card {
        background: var(--paper);
        border: 3px solid #000;
        border-radius: 14px;
        padding: 8px 10px;
        box-shadow: 4px 4px 0 #000;
        color: #000;
      }
      .card.red { background: var(--red); color: #fff; }
      .card.yellow { background: var(--yellow); }
      .card.pink { background: var(--pink); color: #fff; }
      .card h3 {
        margin: 0 0 2px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
      }
      .card .value {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 22px;
        line-height: 1.1;
        font-variant-numeric: tabular-nums;
      }
      .card .value.small { font-size: 18px; }
      .card .best-tag {
        display: inline-block;
        background: #000;
        color: var(--yellow);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 6px;
        transform: rotate(-2deg);
        margin-bottom: 2px;
      }
      .mini-canvas {
        width: 100%;
        aspect-ratio: 4 / 3;
        background: #fff;
        border: 2px solid #000;
        border-radius: 8px;
        display: block;
      }
      .help {
        font-size: 11px;
        color: #000;
        line-height: 1.6;
        font-weight: 700;
      }
      .help kbd {
        background: #000;
        color: var(--yellow);
        padding: 0 5px;
        border-radius: 4px;
        font-size: 10px;
        font-family: "Mochiy Pop P One", monospace;
      }

      /* Touch buttons */
      .touch {
        display: none;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
        padding-top: 2px;
      }
      .touch button {
        background: var(--paper);
        border: 3px solid #000;
        color: #000;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 22px;
        font-weight: 900;
        padding: 14px 0;
        border-radius: 14px;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
      }
      .touch button:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 #000;
      }
      .touch .rotate { background: var(--yellow); }
      .touch .hold { background: var(--pink); color: #fff; }
      .touch .drop { background: var(--red); color: #fff; }

      @media (pointer: coarse), (max-width: 720px) {
        .touch { display: grid; }
        main { grid-template-columns: minmax(0, 1fr) 120px; }
        .card .value { font-size: 18px; }
      }
      @media (max-width: 480px) {
        main { grid-template-columns: minmax(0, 1fr) 96px; }
        .card { padding: 6px 8px; }
        .help { display: none; }
      }

      /* Ueda cut-in overlay (dramatic combo celebration) */
      #cutin {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 6;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #cutin.show .cutin-flash {
        animation: flashBurst 0.55s ease-out forwards;
      }
      #cutin.show .cutin-stripe {
        animation: stripeSweep 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      }
      #cutin.show .cutin-img {
        animation: slideIn 1.9s cubic-bezier(.15,.8,.2,1) forwards;
      }
      #cutin.show .cutin-text {
        animation: textPunch 1.8s cubic-bezier(.15,.85,.25,1) forwards;
      }
      .cutin-flash {
        position: absolute;
        inset: -20%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 255, 255, 1) 0%,
          rgba(255, 225, 0, 0.8) 20%,
          rgba(232, 19, 58, 0.5) 40%,
          transparent 70%
        );
        opacity: 0;
      }
      .cutin-stripe {
        position: absolute;
        left: -120%;
        top: 0;
        width: 240%;
        height: 100%;
        background: repeating-linear-gradient(
          -15deg,
          var(--red) 0 30px,
          var(--yellow) 30px 60px,
          var(--red) 60px 90px,
          #000 90px 110px
        );
        opacity: 0;
        transform: skewX(-10deg);
      }
      .cutin-img {
        position: absolute;
        right: -40%;
        bottom: -2%;
        height: 105%;
        max-height: 105%;
        opacity: 0;
        filter: drop-shadow(-6px 6px 0 #000) drop-shadow(8px 0 0 var(--red));
        transform: translateX(80%) rotate(6deg) scale(0.9);
        z-index: 2;
        pointer-events: none;
      }
      .cutin-text {
        position: absolute;
        left: 50%;
        top: 50%;
        font-family: "Mochiy Pop P One", sans-serif;
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red), 6px 6px 0 #000;
        line-height: 1;
        transform: translate(-50%, -50%) scale(0.4) rotate(-8deg);
        transform-origin: center center;
        opacity: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        pointer-events: none;
        text-align: center;
      }
      .cutin-line1 {
        font-size: clamp(22px, 6vw, 36px);
        transform: rotate(-4deg);
        display: inline-block;
        white-space: nowrap;
      }
      .cutin-line2 {
        font-size: clamp(28px, 7.5vw, 48px);
        display: inline-block;
        white-space: nowrap;
        color: #fff;
        text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 #000;
        transform: rotate(2deg);
      }
      .cutin-text .combo-num {
        display: inline-block;
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        font-size: 1.5em;
        transform: rotate(-8deg) translateY(2px);
        margin-right: 4px;
        text-shadow: 3px 3px 0 var(--red), 6px 6px 0 #000;
      }
      /* Semi-opaque dimmer behind cut-in text so it stays readable */
      .cutin-dim {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(0, 0, 0, 0.55) 0%,
          rgba(0, 0, 0, 0.35) 40%,
          transparent 80%
        );
        opacity: 0;
      }
      #cutin.show .cutin-dim {
        animation: dimPulse 1.6s ease-out forwards;
      }
      @keyframes dimPulse {
        0%   { opacity: 0; }
        15%  { opacity: 1; }
        75%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes flashBurst {
        0%   { opacity: 0; }
        15%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes stripeSweep {
        0%   { opacity: 0; left: -120%; }
        15%  { opacity: 0.9; }
        100% { opacity: 0; left: 120%; }
      }
      @keyframes slideIn {
        0%   { opacity: 0; transform: translateX(80%) rotate(6deg) scale(0.9); }
        25%  { opacity: 1; transform: translateX(0) rotate(-4deg) scale(1.08); }
        40%  { transform: translateX(-2%) rotate(0deg) scale(1); }
        55%  { transform: translateX(0) rotate(-2deg) scale(1.02); }
        85%  { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
        100% { opacity: 0; transform: translateX(10%) rotate(0deg) scale(1); }
      }
      @keyframes textPunch {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-15deg); }
        10%  { opacity: 1; transform: translate(-50%, -50%) scale(1.35) rotate(6deg); }
        20%  { transform: translate(-50%, -50%) scale(0.95) rotate(-4deg); }
        30%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
        45%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        90%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(-2deg); }
      }
      /* Screen shake when cut-in fires */
      .board-frame.shake {
        animation: frameShake 0.45s ease-out;
      }
      @keyframes frameShake {
        0%,100% { transform: translate(0,0); }
        15% { transform: translate(-4px, 2px) rotate(-0.4deg); }
        30% { transform: translate(5px, -2px) rotate(0.3deg); }
        45% { transform: translate(-3px, 3px) rotate(-0.2deg); }
        60% { transform: translate(4px, -1px) rotate(0.2deg); }
        80% { transform: translate(-2px, 1px); }
      }

      /* Float score popups */
      #floaters {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 4;
      }
      .floater {
        position: absolute;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(22px, 5vw, 40px);
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red);
        transform: translate(-50%, -50%);
        animation: floatUp 1.1s ease-out forwards;
        white-space: nowrap;
      }
      .floater.combo { color: var(--pink); }
      .floater.quad { color: #fff; text-shadow: 3px 3px 0 var(--red), -2px -2px 0 var(--yellow); }
      @keyframes floatUp {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        20%  { opacity: 1; transform: translate(-50%, -65%) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, -140%) scale(0.9); }
      }

      /* Game over overlay */
      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 14px;
        z-index: 5;
      }
      .overlay.show { display: flex; }
      .overlay .box {
        text-align: center;
        padding: 18px 24px;
        background: var(--paper);
        border: 4px solid #000;
        border-radius: 18px;
        box-shadow: 6px 6px 0 #000;
        transform: rotate(-1.5deg);
        max-width: 92%;
      }
      .overlay h2 {
        font-family: "Mochiy Pop P One", sans-serif;
        margin: 0 0 6px;
        font-size: clamp(22px, 6vw, 32px);
        color: var(--red);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 #000;
        white-space: nowrap;
      }
      .overlay .score-line {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(18px, 4vw, 24px);
        color: #000;
        margin: 6px 0;
      }
      .overlay .new-best {
        display: inline-block;
        background: var(--yellow);
        color: #000;
        border: 3px solid #000;
        padding: 4px 10px;
        border-radius: 8px;
        transform: rotate(-3deg);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 16px;
        margin: 4px 0;
      }
      .overlay .actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .overlay button {
        font-family: "Mochiy Pop P One", sans-serif;
        border: 3px solid #000;
        border-radius: 999px;
        padding: 10px 22px;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
        transition: transform 0.05s;
      }
      .overlay button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
      .btn-again { background: var(--red); color: #fff; }
      .btn-share { background: var(--yellow); color: #000; }

      /* Start overlay */
      .start-overlay {
        background: radial-gradient(
          circle at 50% 40%,
          rgba(40, 0, 15, 0.85) 0%,
          rgba(0, 0, 0, 0.95) 80%
        );
        z-index: 7;
      }
      .start-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 22px 28px;
      }
      .start-title {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(28px, 9vw, 54px);
        line-height: 1;
        color: var(--yellow);
        -webkit-text-stroke: 5px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--red), 8px 8px 0 #000;
        transform: rotate(-3deg);
        text-align: center;
        white-space: nowrap;
      }
      .start-title .dot { color: var(--red); display: inline-block; transform: rotate(6deg); }
      .start-sub {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(14px, 3.4vw, 18px);
        color: #000;
        text-align: center;
        line-height: 1.4;
        margin-top: 4px;
      }
      .start-sub .start-accent {
        color: var(--red);
        -webkit-text-stroke: 2px #000;
        paint-order: stroke fill;
        font-size: 1.15em;
      }
      .btn-start {
        background: var(--red);
        color: #fff;
        border: 4px solid #000;
        border-radius: 999px;
        padding: 14px 36px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(20px, 5vw, 28px);
        cursor: pointer;
        box-shadow: 5px 5px 0 #000;
        letter-spacing: 0.04em;
        transition: transform 0.05s;
        animation: btnPulse 1.2s ease-in-out infinite;
      }
      .btn-start:active {
        transform: translate(3px, 3px);
        box-shadow: 2px 2px 0 #000;
      }
      @keyframes btnPulse {
        0%, 100% { transform: scale(1) rotate(-1deg); }
        50%      { transform: scale(1.06) rotate(1deg); }
      }
      .start-hint {
        font-size: 11px;
        color: #000;
        font-weight: 700;
        opacity: 0.75;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%) translateY(30px);
        background: #000;
        color: var(--yellow);
        border: 3px solid var(--yellow);
        padding: 8px 16px;
        border-radius: 999px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.25s, transform 0.25s;
        z-index: 10;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 class="title">てんちょーテトリス<span class="dot">！</span></h1>
        <div class="top-buttons">
          <button id="btn-mute" class="icon-btn" aria-label="mute">🔊</button>
          <button id="btn-pause" class="icon-btn" aria-label="pause">⏸</button>
          <button id="btn-restart" class="icon-btn" aria-label="restart">↺</button>
        </div>
      </header>

      <main>
        <div class="board-wrap">
          <div class="board-frame">
            <canvas id="board" width="320" height="640"></canvas>
            <canvas id="fx" width="320" height="640"></canvas>
            <div id="banner" class="banner"><div class="text" id="banner-text"></div></div>
            <div id="combo-banner" class="combo-banner"></div>
            <div id="cutin">
              <div class="cutin-flash"></div>
              <div class="cutin-dim"></div>
              <div class="cutin-stripe"></div>
              <img class="cutin-img" id="cutin-img" src="assets/ueda.png" alt="上田" />
              <div class="cutin-text" id="cutin-text">
                <span class="cutin-line1">上田の</span>
                <span class="cutin-line2"><span class="combo-num" id="cutin-num">1</span> COMBO！</span>
              </div>
            </div>
            <div id="floaters"></div>
            <div id="start-overlay" class="overlay start-overlay show">
              <div class="box start-box">
                <div class="start-title">てんちょー<br/>テトリス<span class="dot">！</span></div>
                <div class="start-sub">4ライン消しで<br/><span class="start-accent">てんちょーさん！</span></div>
                <button class="btn-start" id="btn-start">▶ START</button>
                <div class="start-hint">PC: キーボード / スマホ: タッチ</div>
              </div>
            </div>
            <div id="overlay" class="overlay">
              <div class="box">
                <h2>ゲームオーバー</h2>
                <div id="new-best-tag" class="new-best" style="display:none">🎉 NEW BEST!</div>
                <div class="score-line" id="final-score">SCORE: 0</div>
                <div class="score-line" id="final-best">BEST: 0</div>
                <div class="actions">
                  <button class="btn-again" id="btn-again">もう一回！</button>
                  <button class="btn-share" id="btn-share">結果をシェア</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="side">
          <div class="card red">
            <h3>SCORE</h3>
            <div class="value" id="score">0</div>
          </div>
          <div class="card yellow">
            <span class="best-tag">BEST</span>
            <div class="value small" id="best">0</div>
          </div>
          <div class="card">
            <h3>LINES</h3>
            <div class="value" id="lines">0</div>
          </div>
          <div class="card pink">
            <h3>LEVEL</h3>
            <div class="value" id="level">1</div>
          </div>
          <div class="card">
            <h3>NEXT</h3>
            <canvas id="next" class="mini-canvas" width="120" height="90"></canvas>
          </div>
          <div class="card">
            <h3>HOLD</h3>
            <canvas id="hold" class="mini-canvas" width="120" height="90"></canvas>
          </div>
          <div class="card help">
            <kbd>←</kbd><kbd>→</kbd> 移動<br />
            <kbd>↓</kbd> ソフト<br />
            <kbd>Space</kbd> ハード<br />
            <kbd>↑</kbd>/<kbd>X</kbd> 右回転<br />
            <kbd>Z</kbd> 左回転<br />
            <kbd>Shift</kbd> HOLD<br />
            <kbd>P</kbd> ポーズ
          </div>
        </aside>
      </main>

      <div class="touch" id="touch">
        <button data-key="ArrowLeft">◀</button>
        <button data-key="ArrowDown">▼</button>
        <button data-key="ArrowRight">▶</button>
        <button class="rotate" data-key="ArrowUp">⟳</button>
        <button class="hold" data-key="Shift">H</button>
        <button class="drop" data-key="Space">⤓</button>
      </div>
    </div>

    <div id="toast"></div>

    <script src="tetris.js" defer></script>
  </body>
</html>
